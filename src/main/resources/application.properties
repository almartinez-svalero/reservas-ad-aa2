spring.application.name=reservas-api
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/reservas_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:reservas_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:reservas_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

logging.level.com.aa.reservas=INFO
logging.file.name=logs/reservas-api.log

springdoc.swagger-ui.path=/swagger-ui.html
