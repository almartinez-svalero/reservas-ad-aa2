spring.application.name=reservas-api
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

logging.level.com.aa.reservas=INFO
logging.file.name=logs/reservas-api.log

springdoc.swagger-ui.path=/swagger-ui.html

app.security.username=${APP_SECURITY_USERNAME:admin}
app.security.password=${APP_SECURITY_PASSWORD:admin123}
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:reservas-api-aa2-secret-key-for-local-development-2026}
app.security.jwt.expiration-minutes=${APP_SECURITY_JWT_EXPIRATION_MINUTES:120}
